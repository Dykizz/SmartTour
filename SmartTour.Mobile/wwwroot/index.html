<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SmartTour.Mobile</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .map-container {
            width: 100%;
            height: calc(100vh - 112px);
            position: relative;
            overflow: hidden;
        }
    </style>

</head>

<body>
    <div id="app">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background: linear-gradient(135deg,#0e6eb8 0%,#1a9de8 100%); font-family: Roboto, sans-serif;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:24px; animation: b-bounce 2s infinite ease-in-out;">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            <h2 style="color:white; font-size:2rem; font-weight:800; margin:0 0 8px 0; letter-spacing: 0.5px;">SmartTour</h2>
            <p style="color:rgba(255,255,255,0.85); font-size:0.95rem; margin:0;">Khởi động ứng dụng...</p>
            
            <div style="width:140px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin-top:32px; overflow:hidden;">
                <div style="height:100%; width:40%; background:white; border-radius:2px; animation: b-load 1.2s infinite ease-in-out alternate;"></div>
            </div>
            <style>
                @keyframes b-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
                @keyframes b-load { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
            </style>
        </div>
    </div>

    <div id="blazor-error-ui"
        style="display:none; background: #ffebee; color: #b71c1c; padding: 20px; position: fixed; bottom: 0; width: 100%; z-index: 1000; border-top: 4px solid #f44336;">
        <strong style="display:block; margin-bottom: 10px;">Đã xảy ra lỗi hệ thống:</strong>
        <div id="blazor-error-details"
            style="font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; margin-bottom: 10px;">
            Vui lòng kiểm tra Logcat hoặc bật DetailedErrors trong code.
        </div>
        <a href="" class="reload"
            style="background: #f44336; color: white; padding: 5px 15px; text-decoration: none; border-radius: 4px;">Tải
            lại trang</a>
        <a class="dismiss" style="float: right; cursor: pointer;">🗙</a>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="audioHelper.js"></script>
    <script src="js/mapHelper.js"></script>
    <script src="js/qrHelper.js"></script>
</body>

</html>
