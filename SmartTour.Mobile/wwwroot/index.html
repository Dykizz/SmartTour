<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SmartTour.Mobile</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui" style="display:none; background: #ffebee; color: #b71c1c; padding: 20px; position: fixed; bottom: 0; width: 100%; z-index: 1000; border-top: 4px solid #f44336;">
        <strong style="display:block; margin-bottom: 10px;">Đã xảy ra lỗi hệ thống:</strong>
        <div id="blazor-error-details" style="font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; margin-bottom: 10px;">
            Vui lòng kiểm tra Logcat hoặc bật DetailedErrors trong code.
        </div>
        <a href="" class="reload" style="background: #f44336; color: white; padding: 5px 15px; text-decoration: none; border-radius: 4px;">Tải lại trang</a>
        <a class="dismiss" style="float: right; cursor: pointer;">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="audioHelper.js"></script>
</body>

</html>
